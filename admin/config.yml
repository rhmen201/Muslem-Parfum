backend:
  name: git-gateway
  branch: main # تأكد أن اسم الفرع عندك هو main وليس master

media_folder: "images"
public_folder: "/images"

collections:
  - name: "parfums"
    label: "العطور"
    folder: "parfums" # سيقوم بإنشاء مجلد بهذا الاسم تلقائياً
    create: true
    fields:
      - {label: "اسم العطر", name: "title", widget: "string"}
      - {label: "السعر", name: "price", widget: "number"}
      - {label: "الصورة", name: "image", widget: "image"}
      - {label: "الوصف", name: "body", widget: "markdown"}
